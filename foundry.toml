[profile.default]
src = "contracts"
test = "test/fuzz"
libs = ["node_modules"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
cache_path = "forge-cache"
remappings = [
  "forge-std/=forge-std/",
  "@openzeppelin/=node_modules/@openzeppelin/",
  "@chainlink/=node_modules/@chainlink/"
]

[fuzz]
runs = 10000
